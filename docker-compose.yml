version: "3.9"

services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped

  dashboard:
    build: ./backend
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - ./backend/.env
    volumes:
      - sqlite_data:/app/data
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sqlite_data: